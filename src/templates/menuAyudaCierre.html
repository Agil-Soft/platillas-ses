<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <!-- <meta name="viewport" content="width=device-width, initial-scale=1.0"> -->

    <!-- <link rel="stylesheet" href="https://stackpath.bootstrapcdn.com/bootstrap/4.3.1/css/bootstrap.min.css" integrity="sha384-ggOyR0iXCbMQv3Xipma34MD+dH/1fQ784/j6cY/iJTQUOhcWr7x9JvoRxT2MZw1T" crossorigin="anonymous"> -->

    <style>
        #div_doby {
            margin: 0;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, "Noto Sans", sans-serif, "Apple Color Emoji", "Segoe UI Emoji", "Segoe UI Symbol", "Noto Color Emoji";
            /* font-family: sans-serif; */
            font-size: 1rem;
            font-weight: 400;
            line-height: 1.5;
            color: #212529;
            text-align: left;
            /* background-color: #fff; */
            background-color: #F8F8F8;
            width: 100%;
            min-height: 500px;
        }

        .container {
            width: 70%;
            padding-right: 20px;
            padding-left: 20px;
            margin-top: 15px;
            margin-right: auto;
            margin-left: auto;
        }

        .text-center {
            text-align: center !important;
        }

        .row {
            display: -ms-flexbox;
            display: flex;
            -ms-flex-wrap: wrap;
            flex-wrap: wrap;
            margin-right: -15px;
            margin-left: -15px;
        }

        .col {
            -ms-flex-preferred-size: 0;
            flex-basis: 0;
            -ms-flex-positive: 1;
            flex-grow: 1;
            max-width: 100%;
        }

        .card {
            background-color: #fff;
            border: 1px solid #ddd;
            border-radius: 5px;
            padding: 20px;
            margin-top: 15px;
            width: 100%;
        }

        .btn {
            display: inline-block;
            font-weight: 400;
            color: #212529;
            text-align: center;
            vertical-align: middle;
            -webkit-user-select: none;
            -moz-user-select: none;
            -ms-user-select: none;
            user-select: none;
            background-color: transparent;
            border: 1px solid transparent;
            padding: .375rem .75rem;
            font-size: 1rem;
            line-height: 1.5;
            border-radius: .25rem;
            transition: color .15s ease-in-out, background-color .15s ease-in-out, border-color .15s ease-in-out, box-shadow .15s ease-in-out;
        }

        a {
            color: #007bff;
            text-decoration: none;
            background-color: transparent;
        }

        .text-muted {
            color: #6c757d !important;
        }

        .small,
        small {
            font-size: 80%;
            font-weight: 400;
        }
    </style>
</head>

<body>

    <div id="div_doby">
        <div class="container">
            <div class="row" style="margin-top: 15px;">
                <div class="col text-center" style="width: 100%;">
                    <!-- <img src="cid:LOGOAGIL" alt="logo" style="width: 250px;"> -->
                    <img src="{{logo}}" alt="logo"
                        style="width: 250px;">
                </div>
            </div>
            <div class="row" style="margin-top: 15px;">
                <div class="col">
                    <div class="card">
              
                        <p>
                            Hola,
                            <br/>
                            Le informamos que su solicitud ha pasado a <strong>{{estado}}</strong>
                        </p>
                
                            <!-- <p><strong>Detalles del Ticket:</strong></p> --> 
                
                            <div >
                                <p>
                                <h3>{{titulo}}</h3>
                                {{descripcion}}
                                </p>
                            </div>
                
                
                            <!-- <p><strong>Descripción del Problema o Consulta:</strong></p>
                            <p>{{descripcion}}</p> -->
                
                            <div>
                                {{respuesta}}
                            </div>
                
                            <p>
                                Saludos
                                <br />
                                Equipo de Soporte.
                            </p>
                       
                    </div>
                </div>
            </div>
            <div class="row" style="margin-top: 15px;">
                <div class="col text-center" style="width: 100%;">
                    <p>
                        &nbsp;
                        <span style="color: white; float:right">
                            {{APP_ENV}}
                        </span>
                    </p>
                </div>
            </div>

        </div>
    </div>



</body>

</html>
