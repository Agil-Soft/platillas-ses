<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <!-- <meta name="viewport" content="width=device-width, initial-scale=1.0"> -->
    <!-- <link rel="stylesheet" href="https://stackpath.bootstrapcdn.com/bootstrap/4.3.1/css/bootstrap.min.css" integrity="sha384-ggOyR0iXCbMQv3Xipma34MD+dH/1fQ784/j6cY/iJTQUOhcWr7x9JvoRxT2MZw1T" crossorigin="anonymous"> -->
    <style>
        #div_doby {
            margin: 0;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, "Noto Sans", sans-serif, "Apple Color Emoji", "Segoe UI Emoji", "Segoe UI Symbol", "Noto Color Emoji";
            /* font-family: sans-serif; */
            font-size: 1rem;
            font-weight: 400;
            line-height: 1.5;
            color: #212529;
            text-align: left;
            /* background-color: #fff; */
            background-color: #F8F8F8;
            width: 100%;
            min-height: 500px;
        }

        .container {
            width: 70%;
            padding-right: 20px;
            padding-left: 20px;
            margin-top: 15px;
            margin-right: auto;
            margin-left: auto;
        }

        .text-center {
            text-align: center !important;
        }

        .row {
            display: -ms-flexbox;
            display: flex;
            -ms-flex-wrap: wrap;
            flex-wrap: wrap;
            margin-right: -15px;
            margin-left: -15px;
        }

        .col {
            -ms-flex-preferred-size: 0;
            flex-basis: 0;
            -ms-flex-positive: 1;
            flex-grow: 1;
            max-width: 100%;
        }

        .card {
            position: relative;
            display: -ms-flexbox;
            display: flex;
            -ms-flex-direction: column;
            flex-direction: column;
            min-width: 0;
            word-wrap: break-word;
            background-color: #fff;
            background-clip: border-box;
            border: 1px solid rgba(0, 0, 0, .125);
            border-radius: .25rem;
        }

        .btn {
            display: inline-block;
            font-weight: 400;
            color: #212529;
            text-align: center;
            vertical-align: middle;
            -webkit-user-select: none;
            -moz-user-select: none;
            -ms-user-select: none;
            user-select: none;
            background-color: transparent;
            border: 1px solid transparent;
            padding: .375rem .75rem;
            font-size: 1rem;
            line-height: 1.5;
            border-radius: .25rem;
            transition: color .15s ease-in-out, background-color .15s ease-in-out, border-color .15s ease-in-out, box-shadow .15s ease-in-out;
        }

        a {
            color: #007bff;
            text-decoration: none;
            background-color: transparent;
        }

        .text-muted {
            color: #6c757d !important;
        }

        .small,
        small {
            font-size: 80%;
            font-weight: 400;
        }
    </style>
</head>

<body>
    <div id="div_doby">
        <div class="container">
            <div class="row" style="margin-top: 15px;">
                <div class="col text-center" style="width: 100%;">
                    <!-- <img src="cid:LOGOAGIL" alt="logo" style="width: 250px;"> -->
                    <img src="{{LOGO}}" alt="logo" style="width: 200px;">
                </div>
            </div>
            <div class="row" style="margin-top: 15px;">
                <div class="col" style="width: 100%;">
                    <div style="text-align: center; width: 100%;">
                        <h3>¡ 🎊 🎉 Felicitaciones
                            <span style="text-transform: capitalize">{{COMERCIO_NOMBRE}}</span>
                            🎈 🎁 !

                        </h3>
                    </div>
                    <div class="card" style="min-height: 150px; padding: 30px; width: '100%';">
                        <p>
                            <b> {{SUCURSAL_TITULO}}</b> ha completado el desafio
                            <b> {{DESAFIO_NOMBRE}}</b>
                            <br>
                            <br>
                            Estarás listo para vender cuando tengas tu contrato Agil formalizado.

                        </p>
                    </div>
                </div>
            </div>
            <div class="row" style="margin-top: 15px;">
                <div class="col text-center" style="width: 100%;">
                    <p>
                        &nbsp;

                        <span style="color: white; float:right">
                            {{APP_ENV}}
                        </span>
                    </p>
                </div>
            </div>
        </div>
    </div>
</body>

</html>
