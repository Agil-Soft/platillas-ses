<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <!-- <meta name="viewport" content="width=device-width, initial-scale=1.0"> -->
 
    <!-- <link rel="stylesheet" href="https://stackpath.bootstrapcdn.com/bootstrap/4.3.1/css/bootstrap.min.css" integrity="sha384-ggOyR0iXCbMQv3Xipma34MD+dH/1fQ784/j6cY/iJTQUOhcWr7x9JvoRxT2MZw1T" crossorigin="anonymous"> -->

    <style>
        #div_doby {
            margin: 0;
            font-family: -apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,"Helvetica Neue",Arial,"Noto Sans",sans-serif,"Apple Color Emoji","Segoe UI Emoji","Segoe UI Symbol","Noto Color Emoji";
            /* font-family: sans-serif; */
            font-size: 1rem;
            font-weight: 400;
            line-height: 1.5;
            color: #212529;
            text-align: left;
            /* background-color: #fff; */
            background-color: #F8F8F8; 
            width: 100%; 
            min-height: 500px;
        }

        .container {
            width: 70%;
            padding-right: 20px;
            padding-left: 20px;
            margin-top: 15px;
            margin-right: auto;
            margin-left: auto;
        }

        .text-center {
            text-align: center !important;
        }

        .row {
            margin-right: -15px;
            margin-left: -15px;
        }

        .col {
            max-width: 100%;
        }

        .card {
            position: relative;
            min-width: 0;
            word-wrap: break-word;
            background-color: #fff;
            background-clip: border-box;
            border: 1px solid rgba(0,0,0,.125);
            border-radius: .25rem;
        }

        .btn {
            display: inline-block;
            font-weight: 400;
            color: #212529;
            text-align: center;
            vertical-align: middle;
            -webkit-user-select: none;
            -moz-user-select: none;
            -ms-user-select: none;
            user-select: none;
            background-color: transparent;
            border: 1px solid transparent;
            padding: .375rem .75rem;
            font-size: 1rem;
            line-height: 1.5;
            border-radius: .25rem;
            transition: color .15s ease-in-out,background-color .15s ease-in-out,border-color .15s ease-in-out,box-shadow .15s ease-in-out;
        }

        a {
            color: #007bff;
            text-decoration: none;
            background-color: transparent;
        }

        .text-muted {
            color: #6c757d!important;
        }
        .small, small {
            font-size: 80%;
            font-weight: 400;
        }
    </style>
</head>
<body>
    
    <div id="div_doby" >
        <div class="container">
            <div class="row" style="margin-top: 15px;">
                <div class="col text-center" style="width: 100%;">
                    <img src="{{urlLogo}}" alt="logo" style="width: 250px;margin-top: 40px;">
                </div>
            </div>
            <div class="row" style="margin-top: 15px;">
                <div class="col">
                    <div class="card" style="min-height: 200px; padding: 30px;">
                        <h4 style="margin-bottom: 5px;">Gracias por tu pedido <b>{{nombreCliente}}</b></h4>
                        <p style="margin-top: 10px;">Por qué tu opinión nos importa, con el propósito de mejorar la calidad de nuestro servicio, te invitamos a calificar la experiencia de compra.</p>
                        <a class="btn" href="{{urlEnlace}}" target="_blank" style="width: 150px; color: white; background-color: #FE3814;">Calificar Pedido</a>
                        <br>
                        <small class="text-muted">Si el botón no funciona <a class="small" href="{{urlEnlace}}" target="_blank">Has click aquí</a></small>
                        <br>
                    </div>
                </div>
            </div>
            <div class="row" style="margin-top: 15px;">
                <div class="col text-center" style="width: 100%;">                  
                    <img src="https://agil-ohio.s3.us-east-2.amazonaws.com/Logos/Logo_Agil_Horizontal.png" alt="logo" style="width: 100px;">
                </div>
            </div>

        </div>
    </div>



</body>
</html>
